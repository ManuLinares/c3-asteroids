name: Build and Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-linux-windows:
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      pages: write
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install Linux Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwayland-dev \
            wayland-protocols \
            libwayland-bin \
            libx11-dev \
            libxrandr-dev \
            libxcursor-dev \
            libxi-dev \
            libxext-dev \
            libxkbcommon-dev \
            mingw-w64

      - name: Install C3 Compiler
        run: |
          curl -L https://github.com/c3lang/c3c/releases/download/latest-prerelease-tag/c3-linux.tar.gz | tar xz
          # patch -p1 -d c3 < .github/stdlib.patch
          echo "$(pwd)/c3" >> $GITHUB_PATH

      - name: Setup Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: latest

      - name: Build Linux Target
        run: |
          c3c build linux-deps --trust=full
          c3c build linux --trust=full

      - name: Cache MSVC SDK
        id: cache-msvc
        uses: actions/cache@v5
        with:
          path: ~/.cache/c3/msvc_sdk
          key: ${{ runner.os }}-msvc-sdk

      - name: Build Windows Target
        run: |
          if [ ! -d "$HOME/.cache/c3/msvc_sdk" ]; then
            c3c fetch-sdk windows --accept-license
          else
            echo "Using cached MSVC SDK."
          fi
          c3c build windows-deps --trust=full
          c3c build windows --trust=full

      - name: Build Web Target
        run: |
          c3c build web --trust=full

      - name: Package Release
        run: |
          mkdir -p release/asteroids_linux release/asteroids_windows release/asteroids_web
          
          # Linux
          cp build/asteroids release/asteroids_linux/
          
          # Windows
          cp build/asteroids.exe release/asteroids_windows/
          
          # Web
          cp preview.png build/index.html build/index.js build/index.wasm release/asteroids_web/

          # Zip them up
          cd release
          zip -r ../asteroids_linux.zip asteroids_linux
          zip -r ../asteroids_windows.zip asteroids_windows
          zip -r ../asteroids_web.zip asteroids_web
          cd ..

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v6
        with:
          name: asteroids-builds
          path: |
            *.zip

      - name: Setup Pages
        if: github.ref == 'refs/heads/main'
        uses: actions/configure-pages@v5

      - name: Upload Pages Artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: release/asteroids_web/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            asteroids_linux.zip
            asteroids_windows.zip
            asteroids_web.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-macos:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install C3 Compiler
        run: |
          curl -L https://github.com/c3lang/c3c/releases/download/latest-prerelease-tag/c3-macos.zip -o c3-macos.zip
          unzip c3-macos.zip
          # patch -p1 -d c3 < .github/stdlib.patch
          echo "$(pwd)/c3" >> $GITHUB_PATH

      - name: Build macOS Target
        run: |
          c3c build macos-deps --trust=full
          c3c build macos

      - name: Package Release
        run: |
          mkdir -p release/asteroids_macos
          cp build/asteroids release/asteroids_macos/
          zip -r asteroids_macos.zip release/asteroids_macos

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v6
        with:
          name: asteroids-macos
          path: asteroids_macos.zip

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: asteroids_macos.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy-pages:
    needs: build-linux-windows
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
