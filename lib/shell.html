<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
	<title>Asteroids C3</title>
	<meta property="og:title" content="Asteroids C3" />
	<meta property="og:description" content="A classic Asteroids clone written in C3" />
	<meta property="og:type" content="website" />
	<meta property="og:url" content="https://manulinares.github.io/c3-asteroids/" />
	<meta property="og:image" content="https://manulinares.github.io/c3-asteroids/preview.png" />
	<meta name="twitter:card" content="summary_large_image" />
	<meta name="twitter:title" content="Asteroids C3" />
	<meta name="twitter:description" content="A classic Asteroids clone written in C3" />
	<meta name="twitter:image" content="https://manulinares.github.io/c3-asteroids/preview.png" />
	<style>
		:root { --bg: #000; --text: #fff; --dim: #888; }
		html, body { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--bg); overflow: hidden; display: flex; align-items: center; justify-content: center; font-family: 'Courier New', monospace; }
		canvas { border: none; width: 100vw !important; height: 100vh !important; display: block; image-rendering: pixelated; object-fit: fill; outline: none; }
		#click-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; cursor: pointer; transition: opacity 0.5s ease; }
		#click-overlay h1 { font-size: 4em; letter-spacing: 0.3em; color: var(--text); margin: 0; text-shadow: 0 0 30px rgba(255,255,255,0.4); }
		#click-overlay p { font-size: 1.2em; color: var(--dim); letter-spacing: 0.3em; animation: pulse 1.5s ease-in-out infinite; margin-top: 20px; }
		@keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.3; } }
	</style>
</head>
<body>
	<canvas id="canvas" oncontextmenu="event.preventDefault()" tabindex="-1"></canvas>
	
	<div id="click-overlay" onclick="startGame()">
		<h1>ASTEROIDS C3</h1>
		<p>-- CLICK TO START --</p>
	</div>

	<script>
		function startGame() {
			const overlay = document.getElementById('click-overlay');
			overlay.style.opacity = '0';
			
			// Fullscreen request
			const req = document.documentElement.requestFullscreen;
			if (req) req.call(document.documentElement).catch(e => console.warn(e));

			if (Module._start_web_game) Module._start_web_game();
			setTimeout(() => overlay.remove(), 500);
		}

		var Module = {
			canvas: document.getElementById('canvas')
		};

		window.save_score = score => localStorage.setItem('asteroids_high_score', score);
		window.load_score = () => parseInt(localStorage.getItem('asteroids_high_score') || '0');
	</script>
	{{{ SCRIPT }}}
</body>
</html>
